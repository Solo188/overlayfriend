name: Build Endfield Overlay APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout with saba submodule ─────────────────────────────────
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ── 2. Java ──────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Android SDK + NDK + CMake ─────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 26.1.10909125 and CMake 3.22.1
        run: |
          echo "y" | sdkmanager "ndk;26.1.10909125"
          echo "y" | sdkmanager "cmake;3.22.1"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      # ── 4. Gradle cache ──────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. Download gradle-wrapper.jar ───────────────────────────────────
      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      # ── 6. Verify saba submodule was cloned ──────────────────────────────
      - name: Verify saba submodule
        run: |
          if [ ! -f "app/src/main/cpp/saba/CMakeLists.txt" ]; then
            echo "ERROR: saba submodule not found. Attempting manual init..."
            git submodule update --init --recursive app/src/main/cpp/saba
          fi
          echo "saba submodule OK"

      # ── 7. Make gradlew executable ───────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 8. Создать debug keystore (если ещё нет) ─────────────────────────
      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true

      # ── 9. Release-сборка с R8/ProGuard обфускацией ──────────────────────
      - name: Build Release APK (с обфускацией)
        run: |
          ./gradlew assembleRelease \
            -Pandroid.ndkVersion=26.1.10909125 \
            -Pandroid.injected.signing.store.file=$HOME/.android/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android \
            --stacktrace \
            --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      # ── 10. Verify APK was produced ──────────────────────────────────────
      - name: Verify APK exists
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "ERROR: APK not found at $APK_PATH"
            find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APKs found"
            exit 1
          fi
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "Release APK built successfully: $APK_PATH ($APK_SIZE)"

      # ── 11. Upload Release APK ────────────────────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 14
          if-no-files-found: error
